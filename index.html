<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Scoreboard - Mega Logo Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; background: transparent; color: white; }
        
        /* 保持 0.25 倍率缩小以适应直播间角标 */
        #pc-view {
            display: flex; flex-direction: column; align-items: center;
            padding-top: 50px; transform: scale(0.25); transform-origin: top center;
        }

        #main-scoreboard { display: flex; align-items: center; justify-content: center; }

        .team-group { display: flex; align-items: center; }
        .flex-reverse { flex-direction: row-reverse; }

        /* 1. Logo 放大 150% (从140px到210px) */
        .logo-img { 
            width: 210px; height: 210px; object-fit: contain; 
            z-index: 150; margin: 0 0.2em; /* 进一步收紧间距 */
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
        }

        /* 2. 渐变条：直接连接到比分框，无缝对接 */
        .name-bar {
            height: 100px; padding: 0 60px; display: flex; align-items: center;
            transform: skew(-15deg); border: 2px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
        }
        #bar-h { 
            background: linear-gradient(to left, rgba(10,10,10,0.9), rgba(22,45,68,1)); 
            margin-right: -160px; padding-right: 180px; /* 增加延伸长度以覆盖大Logo下方 */
        }
        #bar-a { 
            background: linear-gradient(to right, rgba(10,10,10,0.9), rgba(139,0,0,1)); 
            margin-left: -160px; padding-left: 180px;
        }

        .name-txt { font-size: 60px; font-weight: 950; transform: skew(15deg); white-space: nowrap; text-transform: uppercase; }

        /* 中间核心区 */
        .center-group { display: flex; align-items: center; z-index: 200; }

        .score-box {
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none; /* ← 去掉白边 */
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    transform: none;
}
.score-val {
    font-size: 125px;
    font-weight: 950;
    transform: none;
}


        /* 3. 节数框：去掉左右边框，变成透明连接桥 */
        #period-box {
    width: 100px;
    height: 100px; /* ← 改成和 name-bar 一样高 */
    background: rgba(0,0,0,0.8);
    color: #ffcc00;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 950;
    border: none; /* ← 你之前要求去掉白边 */
    transform: none;
}
.period-txt {
    transform: none;
}



        /* 手机端控制逻辑 (保持不变) */
        #mobile-ctrl { display: none; padding: 20px; background: #121212; min-height: 100vh; }
        .ctrl-card { background: #222; border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .m-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; font-size: 18px; }
        .score-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .m-btn {
    background: #444;
    border: none;
    color: white;
    width: 90px;   /* ← 更大 */
    height: 90px;  /* ← 更大 */
    border-radius: 14px; /* ← 更圆润 */
    font-size: 40px; /* ← 字更大 */
}

        
        @media screen and (max-width: 800px) { #pc-view { display: none; } #mobile-ctrl { display: block; } }
    </style>
</head>
<body>


<div id="mobile-ctrl">
    <!-- PERIOD -->
    <div class="ctrl-card">
        <select id="in-p" onchange="push()" class="m-input" style="color:#fc0;">
            <option>1ST</option>
            <option>2ND</option>
            <option>3RD</option>
            <option>OT</option>
            <option>FINAL</option>
        </select>
    </div>

    <!-- HOME -->
    <div class="ctrl-card">
        <input id="in-n1" class="m-input" placeholder="HOME NAME" oninput="push()">
        <input type="color" id="in-c1" onchange="push()">

        <div class="score-row">
            <button class="m-btn" onclick="chS('m-s1', -1)">-</button>
            <span id="m-s1" style="font-size:40px;">0</span>
            <button class="m-btn" onclick="chS('m-s1', 1)">+</button>
        </div>

        <input type="file" onchange="upL(this, 1)">
    </div>

    <!-- AWAY -->
    <div class="ctrl-card">
        <input id="in-n2" class="m-input" placeholder="AWAY NAME" oninput="push()">
        <input type="color" id="in-c2" onchange="push()">

        <div class="score-row">
            <button class="m-btn" onclick="chS('m-s2', -1)">-</button>
            <span id="m-s2" style="font-size:40px;">0</span>
            <button class="m-btn" onclick="chS('m-s2', 1)">+</button>
        </div>

        <input type="file" onchange="upL(this, 2)">
    </div>
</div>



<!-- 这是你贴的显示区（pc-view） -->
<div id="pc-view">
    <div id="main-scoreboard">
        <div class="team-group flex-reverse">
            <img id="pc-l1" class="logo-img" src="">
            <div class="name-bar" id="bar-h"><div class="name-txt" id="pc-n1">HOME</div></div>
        </div>

        <div class="center-group">
            <div class="score-box" id="box-h"><div class="score-val" id="pc-s1">0</div></div>
            <div id="period-box"><div class="period-txt" id="pc-p">1ST</div></div>
            <div class="score-box" id="box-a"><div class="score-val" id="pc-s2">0</div></div>
        </div>

        <div class="team-group">
            <img id="pc-l2" class="logo-img" src="">
            <div class="name-bar" id="bar-a"><div class="name-txt" id="pc-n2">AWAY</div></div>
        </div>
    </div>
</div>



<script>

// 修改分数
function chS(id, delta) {
    const el = document.getElementById(id);
    let v = parseInt(el.innerText);
    v += delta;
    if (v < 0) v = 0;
    el.innerText = v;
    push(); // 每次改分数都同步
}

// 上传 logo
function upL(input, team) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        if (team === 1) {
            document.getElementById('pc-l1').src = e.target.result;
        } else {
            document.getElementById('pc-l2').src = e.target.result;
        }
        push();
    };
    reader.readAsDataURL(file);
}

// Firebase 配置
const firebaseConfig = {
    apiKey: "AIzaSyBJIWIwHKMwViEPqZ1O2T20nPKQB8WGX5w",
    authDomain: "hockey-live-4fb35.firebaseapp.com",
    databaseURL: "https://hockey-live-4fb35-default-rtdb.firebaseio.com",
    projectId: "hockey-live-4fb35",
    storageBucket: "hockey-live-4fb35.firebasestorage.app",
    messagingSenderId: "953317134180",
    appId: "1:953317134180:web:4374c570bab5f11b1a3471"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('vMega_Scoreboard');

// 自动取色
function getDominantColorFromImage(imgElement, callback) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = imgElement.src;

    img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let r = 0, g = 0, b = 0, count = 0;

        for (let i = 0; i < data.length; i += 4) {
            r += data[i];
            g += data[i + 1];
            b += data[i + 2];
            count++;
        }

        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);

        const hex = "#" +
            r.toString(16).padStart(2, "0") +
            g.toString(16).padStart(2, "0") +
            b.toString(16).padStart(2, "0");

        callback(hex);
    };
}

// 写入 Firebase（适配旧版 mobile-ctrl）
function push() {
    const data = {};

    // 队名
    const n1 = document.getElementById('in-n1').value.trim();
    const n2 = document.getElementById('in-n2').value.trim();
    if (n1 !== "") data.n1 = n1;
    if (n2 !== "") data.n2 = n2;

    // 分数
    data.s1 = document.getElementById('m-s1').innerText;
    data.s2 = document.getElementById('m-s2').innerText;

    // 颜色（只有用户选了才写）
    const c1 = document.getElementById('in-c1').value;
    const c2 = document.getElementById('in-c2').value;
    if (c1 !== "") data.c1 = c1;
    if (c2 !== "") data.c2 = c2;

    // logo
    const l1 = document.getElementById('pc-l1').src;
    const l2 = document.getElementById('pc-l2').src;
    if (l1) data.l1 = l1;
    if (l2) data.l2 = l2;

    // period（select）
    data.p = document.getElementById('in-p').value;

    db.update(data);
}

// 读取 Firebase → 更新网页端（pc-view）
db.on('value', (snap) => {
    const d = snap.val() || {};

    const defaultHomeColor = "#0A3A78"; // Laval 蓝色

    // 队名
    document.getElementById('pc-n1').innerText = d.n1 || "HOME";
    document.getElementById('pc-n2').innerText = d.n2 || "AWAY";

    // 分数
    document.getElementById('pc-s1').innerText = d.s1 || 0;
    document.getElementById('pc-s2').innerText = d.s2 || 0;

    // period
    document.getElementById('pc-p').innerText = d.p || "1ST";

    // logo
    if (d.l1) document.getElementById('pc-l1').src = d.l1;
    if (d.l2) document.getElementById('pc-l2').src = d.l2;

    // 手动颜色（同步回手机端）
    if (d.c1) document.getElementById('in-c1').value = d.c1;
    if (d.c2) document.getElementById('in-c2').value = d.c2;

    // 自动取色（不依赖 onload）
if (document.getElementById('pc-l2').src) {
    getDominantColorFromImage(document.getElementById('pc-l2'), (autoColor) => {

        // Away：手动优先，否则自动
        const finalAwayColor = (d.c2 && d.c2.trim() !== "") ? d.c2 : autoColor;

        document.getElementById('box-a').style.backgroundColor = finalAwayColor;
        document.getElementById('bar-a').style.background =
            `linear-gradient(to right, rgba(15,15,15,0.95), ${finalAwayColor})`;

        // Home：手动优先，否则 Laval 蓝
        const finalHomeColor = (d.c1 && d.c1.trim() !== "") ? d.c1 : "#0A3A78";

        document.getElementById('box-h').style.backgroundColor = finalHomeColor;
        document.getElementById('bar-h').style.background =
            `linear-gradient(to left, rgba(15,15,15,0.95), ${finalHomeColor})`;
    });
}


</script>
</body>
</html>
